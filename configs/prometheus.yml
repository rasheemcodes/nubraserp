  global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # scrape your NestJS API metrics endpoint
  - job_name: 'erp-api'
    metrics_path: /metrics
    static_configs:
      - targets: ['host.docker.internal:3000']  # if you run Nest locally
        labels:
          service: erp-api

  # scrape Elasticsearch exporter (optional, if you add one)
  # - job_name: 'elasticsearch'
  #   static_configs:
  #     - targets: ['elasticsearch:9200']
